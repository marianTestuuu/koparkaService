<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoKop – usługi koparką</title>

<!-- SEO -->
<meta name="description" content="GeoKop – profesjonalne usługi koparką, wykopy, niwelacja terenu, prace ziemne.">
<meta name="keywords" content="koparka, wykopy, prace ziemne, niwelacja terenu">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Montserrat',sans-serif;background:#fff;color:#111}

/* HEADER */
header{
position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 40px;color:#fff;z-index:10;
}
nav a{margin-left:25px;text-decoration:none;color:#fff;font-weight:600}
.logo img{width:140px;border-radius:50%;background:#fff;padding:10px}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1600&q=80');
background-size:cover;background-position:center;color:#fff;padding:140px 20px 100px;text-align:center;
}
.hero h1{font-size:56px;font-weight:800}
.hero p{font-size:20px;margin:20px 0}
.hero span{color:#f9a825}
.btn{background:#f9a825;padding:14px 30px;border:none;border-radius:30px;font-weight:600;cursor:pointer}

.section{max-width:1200px;margin:auto;padding:80px 20px}

/* SERVICES */
.services{display:grid;grid-template-columns:repeat(4,1fr);gap:25px;margin-top:40px}
.card{border-radius:16px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.08);text-align:center}
.card img{width:100%;height:160px;object-fit:cover}
.card h3{margin:15px 0 5px}
.card p{padding:0 10px 20px;font-size:14px}

/* CONTACT */
.contact{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:center}

.form{border:1px solid #eee;padding:25px;border-radius:12px}
.form-row{display:flex;gap:12px}
.form-row input{flex:1}
.form input,.form textarea{width:100%;padding:14px;margin-bottom:12px;border-radius:8px;border:1px solid #ddd}
.form button{background:#f9a825;border:none;padding:12px 18px;border-radius:30px;font-weight:600;cursor:pointer}

footer{background:#000;color:#fff;text-align:center;padding:40px}

@media(max-width:900px){
.services{grid-template-columns:1fr 1fr}
.contact{grid-template-columns:1fr}
.form-row{flex-direction:column}
}
</style>

<script>
function sendEmail(){
const name=document.getElementById('name').value.trim();
const email=document.getElementById('email').value.trim();
const message=document.getElementById('message').value.trim();

if(!name || !email || !message){
  alert('Wypełnij wszystkie pola');
  return;
}

alert('Zapytanie wysłane');

document.getElementById('name').value='';
document.getElementById('email').value='';
document.getElementById('message').value='';
}
</script>

</head>
<body>

<header>
<div class="logo"><img src="logo.png"></div>
<nav>
<a href="#home">Start</a>
<a href="#uslugi">Usługi</a>
<a href="#kontakt">Kontakt</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Usługi koparką</h1>
